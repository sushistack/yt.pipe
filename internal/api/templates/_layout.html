<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-key" content="{{.APIKey}}">
    <title>{{block "title" .}}yt.pipe Dashboard{{end}}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/htmx.min.js"></script>
    <style>
        /* HTMX indicator */
        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        /* Scrollbar */
        .scroll-thin { scrollbar-width: thin; }
        .scroll-thin::-webkit-scrollbar { width: 4px; }
        .scroll-thin::-webkit-scrollbar-thumb { background: oklch(var(--bc)/0.2); border-radius: 2px; }
    </style>
    <script>
        // Inject Bearer token into all HTMX requests
        document.addEventListener("htmx:configRequest", function(e) {
            var key = document.querySelector('meta[name="api-key"]');
            if (key && key.content) {
                e.detail.headers["Authorization"] = "Bearer " + key.content;
            }
        });

        // HTMX error → toast
        document.addEventListener("htmx:responseError", function(e) {
            var msg = "Request failed";
            try {
                var data = JSON.parse(e.detail.xhr.responseText);
                if (data.error && data.error.message) msg = data.error.message;
            } catch(_) {}
            showToast(msg, "error");
        });

        // HX-Trigger toast
        document.addEventListener("showToast", function(e) {
            var d = e.detail || {};
            showToast(d.message || "Done", d.type || "success");
        });

        function showToast(msg, type) {
            var t = document.createElement("div");
            t.className = "alert alert-" + (type === "error" ? "error" : "success") + " shadow-lg";
            t.innerHTML = '<span>' + msg + '</span>';
            var c = document.getElementById("toast-container");
            if (c) { c.appendChild(t); setTimeout(function(){ t.classList.add("opacity-0"); setTimeout(function(){ t.remove(); }, 300); }, 3000); }
        }

        function editNarration(projectID, sceneNum) {
            var ta = document.getElementById('narration-text-' + sceneNum);
            if (!ta) return;
            ta.removeAttribute('readonly');
            ta.classList.add('textarea-primary');
            ta.focus();
            var saveBtn = document.getElementById('save-btn-' + sceneNum);
            if (saveBtn) saveBtn.style.display = '';
        }

        function saveNarration(projectID, sceneNum) {
            var ta = document.getElementById('narration-text-' + sceneNum);
            if (!ta) return;
            var key = document.querySelector('meta[name="api-key"]');
            fetch('/api/v1/projects/' + projectID + '/scenes/' + sceneNum + '/narration', {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + (key ? key.content : ''), 'Content-Type': 'application/json' },
                body: JSON.stringify({ narration: ta.value })
            }).then(function(r) {
                if (r.ok) {
                    showToast('Narration updated', 'success');
                    ta.setAttribute('readonly', '');
                    ta.classList.remove('textarea-primary');
                    var saveBtn = document.getElementById('save-btn-' + sceneNum);
                    if (saveBtn) saveBtn.style.display = 'none';
                } else { showToast('Failed to update', 'error'); }
            });
        }

        function insertScene(projectID, afterNum) {
            document.getElementById('insert-modal-' + afterNum).showModal();
        }

        function confirmInsert(projectID, afterNum) {
            var ta = document.getElementById('insert-ta-' + afterNum);
            if (!ta || !ta.value.trim()) return;
            var key = document.querySelector('meta[name="api-key"]');
            fetch('/api/v1/projects/' + projectID + '/scenes?after=' + afterNum, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + (key ? key.content : ''), 'Content-Type': 'application/json' },
                body: JSON.stringify({ narration: ta.value })
            }).then(function(r) {
                if (r.ok) { showToast('Scene inserted', 'success'); location.reload(); }
                else { showToast('Failed to insert', 'error'); }
            });
        }

        var _scpItems = [];
        var _scpHasMore = false;
        var _scpLoading = false;
        var _scpQuery = '';
        var _selectedSCP = '';
        var _scpPageSize = 50;

        function openNewProject() {
            var modal = document.getElementById('new-project-modal');
            if (!modal) return;
            modal.showModal();
            if (_scpItems.length === 0) {
                loadSCPs('', 0, false);
            }
        }

        function loadSCPs(q, offset, append) {
            if (_scpLoading) return;
            _scpLoading = true;
            _scpQuery = q;
            var key = document.querySelector('meta[name="api-key"]');
            var url = '/dashboard/scps?limit=' + _scpPageSize + '&offset=' + offset;
            if (q) url += '&q=' + encodeURIComponent(q);
            fetch(url, {
                headers: { 'Authorization': 'Bearer ' + (key ? key.content : '') }
            }).then(function(r) { return r.json(); }).then(function(resp) {
                var d = resp.data || {};
                var items = d.items || [];
                if (append) {
                    _scpItems = _scpItems.concat(items);
                } else {
                    _scpItems = items;
                }
                _scpHasMore = d.has_more || false;
                _scpLoading = false;
                renderSCPList();
            }).catch(function() { _scpLoading = false; });
        }

        function renderSCPList() {
            var list = document.getElementById('scp-list');
            if (!list) return;
            var html = '';
            _scpItems.forEach(function(s) {
                var sel = s.scp_id === _selectedSCP ? ' bg-primary text-primary-content' : ' hover:bg-base-200';
                var tag = s.has_project ? '<span class="badge badge-ghost badge-xs ml-1">exists</span>' : '';
                var title = s.title ? '<span class="text-xs opacity-50 truncate max-w-[180px]" title="' + s.title.replace(/"/g,'&quot;') + '">' + s.title + '</span>' : '';
                var rating = s.rating ? '<span class="badge badge-warning badge-xs gap-0.5"><svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>' + s.rating.toLocaleString() + '</span>' : '';
                html += '<div class="flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer' + sel + '" onclick="selectSCP(\'' + s.scp_id + '\')">' +
                    '<div class="flex items-center gap-2 min-w-0"><span class="font-medium text-sm shrink-0">' + s.scp_id + '</span>' + tag + title + '</div>' +
                    rating + '</div>';
            });
            if (!html) {
                html = '<div class="text-center py-4 opacity-40 text-sm">No matches</div>';
            } else if (_scpHasMore) {
                html += '<div id="scp-load-sentinel" class="text-center py-3 opacity-40 text-sm"><span class="loading loading-spinner loading-xs"></span></div>';
            }
            list.innerHTML = html;
            // Observe sentinel for infinite scroll
            var sentinel = document.getElementById('scp-load-sentinel');
            if (sentinel) {
                var observer = new IntersectionObserver(function(entries) {
                    if (entries[0].isIntersecting && _scpHasMore && !_scpLoading) {
                        observer.disconnect();
                        loadSCPs(_scpQuery, _scpItems.length, true);
                    }
                });
                observer.observe(sentinel);
            }
        }

        function onSCPSearch(val) {
            _scpItems = [];
            _scpHasMore = false;
            loadSCPs(val, 0, false);
        }

        function selectSCP(scpID) {
            _selectedSCP = scpID;
            renderSCPList();
        }

        function createProject() {
            if (!_selectedSCP) { showToast('Select an SCP', 'error'); return; }
            var key = document.querySelector('meta[name="api-key"]');
            fetch('/api/v1/projects', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + (key ? key.content : ''), 'Content-Type': 'application/json' },
                body: JSON.stringify({ scp_id: _selectedSCP })
            }).then(function(r) {
                if (!r.ok) throw r;
                return r.json();
            }).then(function(p) {
                showToast('Project created', 'success');
                window.location = '/dashboard/projects/' + p.id;
            }).catch(function() { showToast('Failed to create project', 'error'); });
        }
    </script>
</head>
<body class="min-h-screen bg-base-200">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50 px-4">
        <div class="flex-1 gap-3">
            <a href="/dashboard/" class="text-xl font-bold">yt.pipe</a>
            <a href="/dashboard/" class="btn btn-ghost btn-sm">Dashboard</a>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast toast-end toast-top z-50 mt-16"></div>

    <!-- Content -->
    <div class="max-w-6xl mx-auto px-4 py-6">
        {{block "content" .}}{{end}}
    </div>
</body>
</html>

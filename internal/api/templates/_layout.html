<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-key" content="{{.APIKey}}">
    <title>{{block "title" .}}yt.pipe Dashboard{{end}}</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .nav-brand { font-weight: 700; font-size: 1.1rem; color: #111827; }
        .nav-link { font-size: 0.875rem; color: #6b7280; }
        .nav-link:hover { color: #111827; }

        .container { max-width: 72rem; margin: 0 auto; padding: 1.5rem; }

        .btn { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; border-radius: 0.375rem; border: none; cursor: pointer; transition: background 0.15s; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .badge { display: inline-block; padding: 0.125rem 0.5rem; font-size: 0.75rem; font-weight: 600; border-radius: 9999px; }
        .badge-pending { background: #f3f4f6; color: #6b7280; }
        .badge-scenario { background: #ede9fe; color: #7c3aed; }
        .badge-images { background: #dbeafe; color: #2563eb; }
        .badge-tts { background: #fef3c7; color: #d97706; }
        .badge-complete { background: #d1fae5; color: #059669; }

        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 0.5rem; overflow: hidden; }
        .card-body { padding: 1rem; }

        .input { padding: 0.5rem 0.75rem; font-size: 0.875rem; border: 1px solid #d1d5db; border-radius: 0.375rem; outline: none; }
        .input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        .select { padding: 0.5rem 0.75rem; font-size: 0.875rem; border: 1px solid #d1d5db; border-radius: 0.375rem; background: #fff; }

        /* Progress bar */
        .progress-bar { display: flex; align-items: center; gap: 0; padding: 1rem 0; }
        .progress-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; cursor: pointer; }
        .progress-step .step-dot { width: 2rem; height: 2rem; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; border: 2px solid #d1d5db; background: #fff; color: #6b7280; z-index: 1; transition: all 0.2s; }
        .progress-step .step-label { margin-top: 0.375rem; font-size: 0.75rem; color: #6b7280; }
        .progress-step.met .step-dot { border-color: #059669; background: #d1fae5; color: #059669; }
        .progress-step.current .step-dot { border-color: #2563eb; background: #2563eb; color: #fff; }
        .progress-step .step-line { position: absolute; top: 1rem; left: 50%; width: 100%; height: 2px; background: #d1d5db; z-index: 0; }
        .progress-step:last-child .step-line { display: none; }
        .progress-step.met .step-line { background: #059669; }

        /* Toast */
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 50; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: slideIn 0.3s ease; }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .spinner { width: 1rem; height: 1rem; border: 2px solid #d1d5db; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-gray { color: #6b7280; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .flex-wrap { flex-wrap: wrap; }
    </style>
    <script>
        // Inject Bearer token into all HTMX requests
        document.addEventListener("htmx:configRequest", function(e) {
            var key = document.querySelector('meta[name="api-key"]');
            if (key && key.content) {
                e.detail.headers["Authorization"] = "Bearer " + key.content;
            }
        });

        // Handle HTMX errors
        document.addEventListener("htmx:responseError", function(e) {
            var msg = "Request failed";
            try {
                var data = JSON.parse(e.detail.xhr.responseText);
                if (data.error && data.error.message) msg = data.error.message;
            } catch(_) {}
            showToast(msg, "error");
        });

        // Toast triggered by HX-Trigger header
        document.addEventListener("showToast", function(e) {
            var detail = e.detail || {};
            showToast(detail.message || "Done", detail.type || "success");
        });

        function showToast(msg, type) {
            var container = document.getElementById("toast-container");
            if (!container) return;
            var toast = document.createElement("div");
            toast.className = "toast toast-" + (type || "success");
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function() { toast.style.animation = "fadeOut 0.3s ease"; setTimeout(function() { toast.remove(); }, 300); }, 3000);
        }
    </script>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">yt.pipe</span>
        <a href="/dashboard/" class="nav-link">Dashboard</a>
    </nav>
    <div id="toast-container" class="toast-container"></div>
    <div class="container">
        {{block "content" .}}{{end}}
    </div>
</body>
</html>

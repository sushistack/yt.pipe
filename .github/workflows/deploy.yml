name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go test ./...
      - run: go vet ./...

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install Chromium
        run: go run github.com/playwright-community/playwright-go/cmd/playwright install --with-deps chromium
      - name: Run E2E tests
        run: go test -tags=e2e -timeout 300s -v ./tests/e2e/...

  build-and-push:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "yt-pipe",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}"
            }'

  notify:
    needs: [test, e2e, build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "yt-pipe deploy"
          description: |
            **Test:** ${{ needs.test.result }}
            **E2E:** ${{ needs.e2e.result }}
            **Build:** ${{ needs.build-and-push.result }}
            **Deploy:** ${{ needs.deploy.result }}
            **Commit:** `${{ github.sha }}` — ${{ github.event.head_commit.message }}
            **Branch:** `${{ github.ref_name }}`
            **By:** ${{ github.actor }}
          color: ${{ needs.deploy.result == 'success' && '0x57F287' || '0xED4245' }}
          username: "GitHub Actions"
